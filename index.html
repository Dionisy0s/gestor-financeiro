<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Gestor Financeiro</title>

<link rel="stylesheet" href="styles.css">
<link rel="manifest" href="manifest.json">

</head>

<body>

<header>

<h1>Gestor Financeiro</h1>

<select id="userSelector">
<option value="user1">Usuário 1</option>
<option value="user2">Usuário 2</option>
</select>

<button id="jointMode">Modo Conjunto</button>

</header>

<main>

<section>

<h2>Adicionar Transação</h2>

<input id="desc" placeholder="Descrição">
<input id="value" type="number">

<select id="type">
<option value="income">Receita</option>
<option value="expense">Despesa</option>
</select>

<button id="addTransaction">Adicionar</button>

</section>

</main>

<script src="app.js"></script>

</body>

</html>
